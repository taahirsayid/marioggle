name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm install --include=dev
      - run: npm run build -w @marioggle/shared
      - run: npm run build -w @marioggle/engine
      - run: npm test

  build-web:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm install --include=dev
      - run: npm run build -w @marioggle/shared
      - run: npm run build -w @marioggle/web
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

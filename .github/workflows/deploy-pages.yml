name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build dictionary (optional)
        run: npm run build:dictionary
        continue-on-error: true

      - name: Build shared package
        run: npm run build -w @marioggle/shared

      - name: Build web app
        run: npm run build -w @marioggle/web
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: SPA fallback for client-side routes
        run: cp apps/web/dist/index.html apps/web/dist/404.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/web/dist
          cname: false
